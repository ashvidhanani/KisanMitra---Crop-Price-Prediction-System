<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">🌾</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join KisanMitra today</p>

    <div class="field">
      <label>Full Name</label>
      <input
        type="text"
        [(ngModel)]="name"
        placeholder="Ravi Kumar"
        name="name"
        autocomplete="name"
      />
    </div>

    <div class="field">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        name="email"
        autocomplete="email"
      />
    </div>

    <div class="field">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Min. 6 characters"
        name="password"
        autocomplete="new-password"
        (keyup.enter)="register()"
      />
    </div>

    <div class="error-box"   *ngIf="error">⚠️ {{ error }}</div>
    <div class="success-box" *ngIf="success">✅ {{ success }}</div>

    <button class="btn-auth" (click)="register()" [disabled]="loading">
      <span *ngIf="!loading">Create Account</span>
      <span *ngIf="loading" class="btn-loading">
        <span class="spinner-sm"></span> Creating...
      </span>
    </button>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/login">Sign in here</a>
    </p>

  </div>
</div>
